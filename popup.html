<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PureMDread</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #ffffff;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e1e4e8;
    }
    
    .header-icon {
      font-size: 24px;
    }
    
    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: #24292f;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #656d76;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    
    .setting-label {
      font-size: 14px;
      color: #24292f;
    }
    
    .toggle-switch {
      position: relative;
      width: 40px;
      height: 20px;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 20px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #0969da;
    }
    
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    
    .shortcut-list {
      list-style: none;
    }
    
    .shortcut-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
    }
    
    .shortcut-key {
      background: #f6f8fa;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      color: #0969da;
    }
    
    .footer {
      padding-top: 12px;
      border-top: 1px solid #e1e4e8;
      text-align: center;
    }
    
    .footer-text {
      font-size: 11px;
      color: #656d76;
    }
    
    .btn {
      width: 100%;
      padding: 8px 12px;
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: #24292f;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: #e1e4e8;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">📄</span>
    <span class="header-title">PureMDread</span>
  </div>
  
  <div class="section">
    <div class="section-title">设置</div>
    <div class="setting-item">
      <span class="setting-label">暗色模式</span>
      <label class="toggle-switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  
  <div class="section">
    <div class="section-title">功能</div>
    <button class="btn" id="openFile">📂 打开本地Markdown文件</button>
  </div>
  
  <div class="section">
    <div class="section-title">快捷键</div>
    <ul class="shortcut-list">
      <li class="shortcut-item">
        <span>切换目录</span>
        <span class="shortcut-key">📑</span>
      </li>
      <li class="shortcut-item">
        <span>切换主题</span>
        <span class="shortcut-key">🌓</span>
      </li>
      <li class="shortcut-item">
        <span>调整字体</span>
        <span class="shortcut-key">A+/A-</span>
      </li>
    </ul>
  </div>
  
  <div class="footer">
    <div class="footer-text">v1.0.0 | 支持 .md .markdown .mdown .mkd</div>
  </div>

  <script src="js/popup.js"></script>
</body>
</html>
